<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Personal Development Tracker</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f7; color: #1a1a1a; }
      input, textarea, select { font-family: inherit; font-size: 14px; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; width: 100%; }
      input:focus, textarea:focus { border-color: #888; }
      button { font-family: inherit; cursor: pointer; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
